services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      #- "80:80"
      #- "443:443"
      #- "443:443/udp"
      - "8080:8080"
    volumes:
      - ${CADDYFILE_DIR}:/etc/caddy
     # -./site:/srv
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
