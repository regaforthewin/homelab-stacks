version: '3.5'
services:
  dash:
    image: mauricenino/dashdot:latest
    restart: unless-stopped
    privileged: true
    ports:
      - '3001:3001'
    volumes:
      - ${DASHDOT_DIRECTORY}:/mnt/host:ro
    environment:
      DASHDOT_WIDGET_LIST: 'os,cpu,storage,ram,network'
      DASHDOT_ALWAYS_SHOW_PERCENTAGES: 'true'
      DASHDOT_PAGE_TITLE: 'Satellite | dash.'
      DASHDOT_OVERRIDE_OS: 'Ubuntu 24.04.3 LTS'
      DASHDOT_OVERRIDE_ARCH: 'x86_64'
      DASHDOT_SHOW_HOST: 'true'
      DASHDOT_ENABLE_CPU_TEMPS: 'true'
      DASHDOT_OVERRIDE_RAM_BRAND: 'V-GEN'
